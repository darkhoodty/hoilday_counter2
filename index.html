<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휴일 & 날씨 플래너 대시보드</title>
    <!-- Google Fonts: Inter & Noto Sans KR for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons for clean, modern vector icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Title Bar / Header (Windows 11 style) -->
        <header class="app-header">
            <div class="app-title-group">
                <div class="app-icon-wrapper">
                    <i data-lucide="calendar-heart" class="app-logo-icon"></i>
                </div>
                <div>
                    <h1>공휴일 플래너</h1>
                    <p class="subtitle">Windows 11 Fluent Design Calendar</p>
                </div>
            </div>
            
            <!-- Connection Status -->
            <div class="connection-status-panel">
                <span class="status-indicator" id="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text" id="status-text">연결 확인 중...</span>
                </span>
            </div>
        </header>

        <!-- Main Dashboard Content -->
        <main class="dashboard-grid">
            <!-- Left Side: Calendar Control & Grid -->
            <section class="widget calendar-widget">
                <div class="widget-header">
                    <div class="calendar-controls">
                        <button class="win-btn icon-btn" id="prev-month-btn" title="이전 달">
                            <i data-lucide="chevron-left"></i>
                        </button>
                        
                        <div class="dropdown-group">
                            <select id="year-select" class="win-select">
                                <option value="2024">2024년</option>
                                <option value="2025">2025년</option>
                                <option value="2026" selected>2026년</option>
                                <option value="2027">2027년</option>
                            </select>
                            
                            <select id="month-select" class="win-select">
                                <option value="1">1월</option>
                                <option value="2">2월</option>
                                <option value="3">3월</option>
                                <option value="4">4월</option>
                                <option value="5">5월</option>
                                <option value="6">6월</option>
                                <option value="7">7월</option>
                                <option value="8">8월</option>
                                <option value="9">9월</option>
                                <option value="10">10월</option>
                                <option value="11">11월</option>
                                <option value="12">12월</option>
                            </select>
                        </div>
                        
                        <button class="win-btn icon-btn" id="next-month-btn" title="다음 달">
                            <i data-lucide="chevron-right"></i>
                        </button>
                    </div>
                    
                    <button class="win-btn secondary-btn" id="today-btn">
                        <i data-lucide="rotate-ccw"></i> 오늘로 이동
                    </button>
                </div>

                <!-- Calendar View -->
                <div class="calendar-container">
                    <div class="calendar-weekdays">
                        <div class="weekday sun">일</div>
                        <div class="weekday">월</div>
                        <div class="weekday">화</div>
                        <div class="weekday">수</div>
                        <div class="weekday">목</div>
                        <div class="weekday">금</div>
                        <div class="weekday sat">토</div>
                    </div>
                    <div class="calendar-days" id="calendar-days-grid">
                        <!-- Loaded dynamically via JavaScript -->
                    </div>
                </div>

                <!-- Legend -->
                <div class="calendar-legend">
                    <div class="legend-item"><span class="legend-color weekday-dot"></span>평일</div>
                    <div class="legend-item"><span class="legend-color sat-dot"></span>토요일</div>
                    <div class="legend-item"><span class="legend-color holiday-dot"></span>공휴일</div>
                    <div class="legend-item"><span class="legend-color today-dot"></span>오늘</div>
                </div>
            </section>

            <!-- Right Side: Holiday Detail & Summary -->
            <section class="widget detail-widget">
                <div class="widget-header">
                    <h2>
                        <i data-lucide="info"></i> 휴일 상세 정보
                    </h2>
                </div>

                <!-- Selected Date Display -->
                <div class="detail-card info-card">
                    <div class="date-big-display">
                        <span class="day-num" id="selected-day-num">--</span>
                        <div class="date-meta">
                            <span class="full-date" id="selected-full-date">날짜를 선택하세요</span>
                            <span class="day-desc" id="selected-day-desc">평일</span>
                        </div>
                    </div>
                </div>

                <!-- Monthly Holiday Summary Card -->
                <div class="detail-card summary-card">
                    <h3 class="summary-title">
                        <i data-lucide="gift"></i> 이달의 공휴일 목록
                    </h3>
                    <div class="holiday-list-container">
                        <ul class="holiday-list-ul" id="monthly-holiday-list">
                            <!-- Loaded dynamically via JavaScript -->
                        </ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- App Logic -->
    <script src="index.js"></script>
</body>
</html>
